name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: stigpt-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build Frontend Apps
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app:
          - admin-portal
          - player-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.5'
          cache: npm
          cache-dependency-path: frontend/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: frontend/${{ matrix.app }}
        run: npm ci

      - name: Build
        working-directory: frontend/${{ matrix.app }}
        run: npm run build

  deploy:
    name: Deploy to Aliyun
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy isolated StiGPT stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p /opt/stigpt
            cd /opt/stigpt
            if [ ! -d backend/.git ]; then
              git clone https://github.com/admin13786/StiGPT_backend.git backend
            fi
            if [ ! -d frontent/.git ]; then
              git clone https://github.com/admin13786/StiGPT_Frontend.git frontent
            fi
            git -C backend fetch origin main
            git -C backend checkout main
            git -C backend pull --ff-only origin main
            git -C frontent fetch origin main
            git -C frontent checkout main
            git -C frontent pull --ff-only origin main
            if [ ! -f /opt/stigpt/frontent/.env ]; then
              cp /opt/stigpt/frontent/.env.example /opt/stigpt/frontent/.env
              echo "Created /opt/stigpt/frontent/.env from example. Fill secrets before first production start."
              exit 1
            fi
            cd /opt/stigpt/frontent
            docker compose -p stigpt up -d --build
            docker compose -p stigpt ps
