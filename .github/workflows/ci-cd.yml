name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: stigpt-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build Frontend Apps
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app:
          - admin-portal
          - player-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.5'
          cache: npm
          cache-dependency-path: frontend/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: frontend/${{ matrix.app }}
        run: npm ci

      - name: Build
        working-directory: frontend/${{ matrix.app }}
        run: npm run build

  deploy:
    name: Deploy to Aliyun
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: Trust server host key
        run: |
          mkdir -p ~/.ssh
          HOST="${{ secrets.ALIYUN_HOST || '121.89.87.255' }}"
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Sync frontend sources
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'logs' \
            --exclude 'uploads' \
            --exclude '_workspace' \
            --exclude 'references' \
            ./ "${{ secrets.ALIYUN_USER || 'root' }}@${{ secrets.ALIYUN_HOST || '121.89.87.255' }}:/opt/stigpt/frontent/"

      - name: Rebuild isolated compose stack
        run: |
          ssh "${{ secrets.ALIYUN_USER || 'root' }}@${{ secrets.ALIYUN_HOST || '121.89.87.255' }}" '
            set -euo pipefail
            if [ ! -f /opt/stigpt/frontent/.env ] && [ -f /opt/stigpt/frontent/.env.example ]; then
              cp /opt/stigpt/frontent/.env.example /opt/stigpt/frontent/.env
            fi
            cd /opt/stigpt/frontent
            if [ -f .env ]; then
              docker compose -p stigpt up -d --build
              docker compose -p stigpt ps
            else
              echo "Missing /opt/stigpt/frontent/.env"
              exit 1
            fi
          '
