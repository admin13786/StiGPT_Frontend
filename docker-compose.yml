# StiGPT learning clone - default Docker Compose stack
#
# Canonical usage:
#   Start the default stack:  docker compose up -d --build
#   Check service status:     docker compose ps
#   Tail a service log:       docker compose logs -f backend
#   Stop the default stack:   docker compose down

services:
  # ==================== 核心服务 ====================

  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-game_ai_cs}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # 生产环境必须通过环境变量设置密码
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD 环境变量}
    ports:
      - "${POSTGRES_HOST_PORT:-32113}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d game_ai_cs"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - game-ai-cs-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-32114}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - game-ai-cs-network
    restart: unless-stopped

  # Milvus 向量数据库
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    profiles:
      - rag
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - game-ai-cs-network
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    profiles:
      - rag
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - game-ai-cs-network
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.3.3
    profiles:
      - rag
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "${MILVUS_GRPC_HOST_PORT:-32115}:19530"
      - "${MILVUS_HTTP_HOST_PORT:-32116}:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    networks:
      - game-ai-cs-network
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=21101
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_TIMEZONE_OFFSET=${LOG_TIMEZONE_OFFSET:-480}
      - LOG_SUCCESS_REQUESTS=${LOG_SUCCESS_REQUESTS:-false}
      - LOG_SAMPLING_RATE=${LOG_SAMPLING_RATE:-0.1}
      - LOG_STDOUT=${LOG_STDOUT:-true}
      - LOG_FILE=${LOG_FILE:-true}
      - LOG_IGNORE_PATHS=${LOG_IGNORE_PATHS:-/api/v1/metrics,/api/v1/docs,/uploads}
      - LOG_USE_REDIS_BUFFER=${LOG_USE_REDIS_BUFFER:-false}
      - LOG_REDIS_MAX_SIZE=${LOG_REDIS_MAX_SIZE:-20000}
      - LOG_CONSUMER_BATCH_SIZE=${LOG_CONSUMER_BATCH_SIZE:-500}
      - LOG_CONSUMER_POLL_INTERVAL=${LOG_CONSUMER_POLL_INTERVAL:-500}
      - LOG_BATCH_SIZE=${LOG_BATCH_SIZE:-200}
      - LOG_BATCH_INTERVAL=${LOG_BATCH_INTERVAL:-300}
      - LOG_MAX_QUEUE_SIZE=${LOG_MAX_QUEUE_SIZE:-20000}
      # 数据库连接 - 使用环境变量构建连接字符串
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-game_ai_cs}?schema=public
      # 数据库连接池配置
      - DB_CONNECTION_LIMIT=${DB_CONNECTION_LIMIT:-50}
      - DB_POOL_TIMEOUT=${DB_POOL_TIMEOUT:-20}
      - DB_CONNECT_TIMEOUT=${DB_CONNECT_TIMEOUT:-10}
      - DB_QUERY_TIMEOUT=${DB_QUERY_TIMEOUT:-30}
      - DB_STATEMENT_TIMEOUT=${DB_STATEMENT_TIMEOUT:-30000}
      - DB_IDLE_TIMEOUT=${DB_IDLE_TIMEOUT:-600}
      - DB_POOL_MONITORING=${DB_POOL_MONITORING:-true}
      - DB_POOL_LOG_LEVEL=${DB_POOL_LOG_LEVEL:-warn}
      # JWT 配置 - 生产环境必须设置
      - JWT_SECRET=${JWT_SECRET:?请设置 JWT_SECRET 环境变量}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-8h}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:32111,http://localhost:32112,http://127.0.0.1:32111,http://127.0.0.1:32112}
      # Dify AI 配置 - 生产环境必须设置
      - DIFY_API_KEY=${DIFY_API_KEY:?请设置 DIFY_API_KEY 环境变量}
      - DIFY_BASE_URL=${DIFY_BASE_URL:-http://ai.sh7road.com/v1}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # 加密配置 - 生产环境必须设置
      - ENCRYPTION_SECRET_KEY=${ENCRYPTION_SECRET_KEY:?请设置 ENCRYPTION_SECRET_KEY 环境变量（至少32字符）}
      - ENCRYPTION_SALT=${ENCRYPTION_SALT:?请设置 ENCRYPTION_SALT 环境变量}
      # 百度翻译配置 - 生产环境必须设置
      - BAIDU_TRANSLATE_APP_ID=${BAIDU_TRANSLATE_APP_ID:?请设置 BAIDU_TRANSLATE_APP_ID 环境变量}
      - BAIDU_TRANSLATE_SECRET=${BAIDU_TRANSLATE_SECRET:?请设置 BAIDU_TRANSLATE_SECRET 环境变量}
      # 阿里云 AI 服务配置
      - ALIYUN_API_KEY=${ALIYUN_API_KEY:?请设置 ALIYUN_API_KEY 环境变量}
      - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID:?请设置 ALIYUN_ACCESS_KEY_ID 环境变量}
      - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET:?请设置 ALIYUN_ACCESS_KEY_SECRET 环境变量}
      # Milvus 配置
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      # Embedding 配置
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v2}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-25}
      # LLM 配置
      - LLM_MODEL=${LLM_MODEL:-qwen-turbo}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2000}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      # TTS 配置
      - TTS_VOICE=${TTS_VOICE:-zhixiaoxia}
      - TTS_SAMPLE_RATE=${TTS_SAMPLE_RATE:-16000}
      - TTS_FORMAT=${TTS_FORMAT:-wav}
      - ALIYUN_TTS_APP_KEY=${ALIYUN_TTS_APP_KEY}
      # 文档处理配置
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - MAX_DOCUMENT_SIZE=${MAX_DOCUMENT_SIZE:-52428800}
      - SUPPORTED_DOCUMENT_TYPES=${SUPPORTED_DOCUMENT_TYPES:-pdf,md}
    ports:
      - "${BACKEND_HOST_PORT:-32101}:21101"
    volumes:
      - ../backend/uploads:/app/uploads
      - ../backend/logs:/app/logs
      - ../backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - game-ai-cs-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=backend,env=production"

  admin-portal:
    build:
      context: ./frontend/admin-portal
      dockerfile: Dockerfile
    ports:
      - "${ADMIN_HOST_PORT:-32111}:20101"
    depends_on:
      - backend
    networks:
      - game-ai-cs-network
    restart: unless-stopped

  player-app:
    build:
      context: ./frontend/player-app
      dockerfile: Dockerfile
    ports:
      - "${PLAYER_HOST_PORT:-32112}:20102"
    depends_on:
      - backend
    networks:
      - game-ai-cs-network
    restart: unless-stopped

